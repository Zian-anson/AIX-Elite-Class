<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI+X 实验班 · 真实项目选择</title>
<style>
:root {
  --bg: #0c0c0e; --surface: #16161a; --card: #1e1e24;
  --border: #2a2a32; --text: #e4e4ea; --sec: #88889a;
  --acc: #6c8cff; --acc-soft: rgba(108,140,255,.1);
  --radius: 10px; --font: 'Inter',-apple-system,system-ui,sans-serif;
  --green: #34d399; --green-soft: rgba(52,211,153,.12);
  --orange: #fbbf24; --orange-soft: rgba(251,191,36,.12);
  --red: #f87171; --red-soft: rgba(248,113,113,.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; }
a { color:inherit; text-decoration:none; }

/* Hero */
.hero {
  background: linear-gradient(135deg,#0c0b1a,#151330,#0a0a18);
  padding: 48px 24px 36px; text-align: center;
  border-bottom: 1px solid var(--border); position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(108,140,255,.06) 0%, transparent 70%);
}
.hero .tag {
  display: inline-block; font-size: .7em; padding: 4px 14px; border-radius: 20px;
  background: var(--acc-soft); color: var(--acc); margin-bottom: 10px;
  position: relative;
}
.hero h1 {
  font-size: 2em; font-weight: 700; letter-spacing: -.02em;
  background: linear-gradient(135deg,#6c8cff,#a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  position: relative;
}
.hero p.sub { color: var(--sec); font-size: .85em; margin-top: 6px; position: relative; }

/* Countdown */
.countdown-bar {
  display: flex; justify-content: center; gap: 20px;
  margin: 20px auto 0; position: relative; flex-wrap: wrap;
}
.countdown-bar .deadline {
  font-size: .75em; color: var(--sec);
  display: flex; align-items: center; gap: 6px;
}
.countdown-bar .deadline strong { color: var(--text); }
.countdown-item { text-align: center; }
.countdown-item .num {
  font-size: 1.8em; font-weight: 700; color: var(--acc);
  line-height: 1; letter-spacing: -.03em;
}
.countdown-item .label { font-size: .6em; color: var(--sec); margin-top: 2px; }

/* Stats */
.stats {
  display: flex; justify-content: center; gap: 28px;
  padding: 16px 0; border-bottom: 1px solid var(--border);
  font-size: .78em; color: var(--sec); flex-wrap: wrap;
}
.stats span { display: flex; align-items: center; gap: 6px; }
.stats strong { color: var(--text); font-weight: 600; }

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

/* Breadcrumb */
.breadcrumb {
  padding: 14px 0; font-size: .75em; color: var(--sec);
  display: flex; align-items: center; gap: 8px;
}
.breadcrumb a { color: var(--acc); }
.breadcrumb a:hover { text-decoration: underline; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; align-items: center;
  padding: 16px 0; flex-wrap: wrap;
}
.filter-btn {
  padding: 5px 14px; border-radius: 16px; font-size: .75em;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--sec); cursor: pointer; transition: .12s;
  font-family: var(--font);
}
.filter-btn:hover { border-color: var(--acc); color: var(--text); }
.filter-btn.active { background: var(--acc-soft); border-color: var(--acc); color: var(--acc); }
.search-box {
  margin-left: auto; display: flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0 12px; gap: 6px;
}
.search-box input {
  background: none; border: none; outline: none; color: var(--text);
  font-size: .78em; padding: 7px 0; width: 180px; font-family: var(--font);
}
.search-box input::placeholder { color: #555; }
.search-box svg { width: 14px; height: 14px; fill: none; stroke: var(--sec); stroke-width: 2; }

/* Grid */
.grid-info {
  font-size: .72em; color: var(--sec); padding: 4px 0 10px;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 10px; padding-bottom: 40px;
}

/* Card */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  cursor: pointer; transition: .15s; position: relative;
}
.card:hover { border-color: var(--acc); transform: translateY(-2px); }
.card .card-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.card .pnum {
  font-size: .65em; font-weight: 600; color: var(--acc);
  background: var(--acc-soft); padding: 2px 10px; border-radius: 10px;
}
.card .diff-badge {
  font-size: .6em; padding: 2px 10px; border-radius: 10px;
  font-weight: 500;
}
.diff-轻量 { color: var(--green); background: var(--green-soft); }
.diff-中等 { color: var(--orange); background: var(--orange-soft); }
.diff-挑战 { color: var(--red); background: var(--red-soft); }
.card h3 {
  font-size: .88em; font-weight: 600; margin-bottom: 4px;
  line-height: 1.4;
}
.card .publisher {
  font-size: .68em; color: var(--sec); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.card .publisher .source-tag {
  font-size: .9em; padding: 1px 8px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
}
.card .desc {
  font-size: .75em; color: var(--sec); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .tags {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px;
}
.card .tag-item {
  font-size: .6em; padding: 2px 8px; border-radius: 8px;
  background: var(--surface); color: var(--sec); border: 1px solid var(--border);
}

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  justify-content: center; align-items: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 640px; width: 100%;
  max-height: 85vh; overflow-y: auto; position: relative;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.modal-header {
  padding: 20px 24px 12px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-header .close {
  position: absolute; right: 16px; top: 16px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--sec); cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: 1em; transition: .12s; font-family: var(--font);
}
.modal-header .close:hover { background: var(--card); color: var(--text); }
.modal-header .modal-pnum {
  font-size: .65em; color: var(--acc); font-weight: 600;
}
.modal-header h2 { font-size: 1.1em; font-weight: 600; margin: 4px 0; padding-right: 36px; line-height: 1.4; }
.modal-header .modal-meta {
  font-size: .72em; color: var(--sec); margin-top: 6px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.modal-body { padding: 16px 24px 24px; }
.modal-body section { margin-bottom: 16px; }
.modal-body h4 {
  font-size: .75em; font-weight: 600; color: var(--acc);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em;
}
.modal-body .field {
  font-size: .78em; color: var(--text); line-height: 1.6;
}
.modal-body .field.sec { color: var(--sec); }
.modal-body .roles {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
}
.modal-body .role {
  font-size: .7em; padding: 2px 10px; border-radius: 8px;
  background: var(--acc-soft); color: var(--acc);
}
.modal-body hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* Timeline section */
.timeline-section {
  padding: 40px 0; border-top: 1px solid var(--border);
}
.timeline-section h2 {
  font-size: 1.1em; font-weight: 600; margin-bottom: 20px;
  text-align: center;
}
.timeline {
  display: flex; overflow-x: auto; gap: 0;
  padding: 8px 0; position: relative;
  max-width: 900px; margin: 0 auto;
}
.timeline::before {
  content: ''; position: absolute; top: 24px; left: 30px; right: 30px;
  height: 2px; background: var(--border);
}
.timeline-item {
  flex: 1; min-width: 100px; text-align: center;
  position: relative; padding-top: 16px;
}
.timeline-item .dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--card); border: 2px solid var(--border);
  position: absolute; top: 19px; left: 50%; transform: translateX(-50%);
  z-index: 1;
}
.timeline-item.active .dot { background: var(--acc); border-color: var(--acc); box-shadow: 0 0 8px rgba(108,140,255,.4); }
.timeline-item.urgent .dot { background: var(--orange); border-color: var(--orange); }
.timeline-item .tl-date { font-size: .65em; color: var(--acc); font-weight: 600; }
.timeline-item .tl-label { font-size: .68em; color: var(--sec); margin-top: 2px; }
.timeline-item.active .tl-label { color: var(--text); font-weight: 500; }

/* CTA */
.cta-section {
  text-align: center; padding: 32px 0 48px;
  border-top: 1px solid var(--border);
}
.cta-section h2 { font-size: 1em; font-weight: 600; margin-bottom: 6px; }
.cta-section p { font-size: .78em; color: var(--sec); max-width: 500px; margin: 0 auto 16px; }
.cta-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 28px; border-radius: 10px;
  background: var(--acc); color: #fff; font-weight: 600;
  font-size: .85em; border: none; cursor: pointer;
  transition: .12s; font-family: var(--font);
}
.cta-btn:hover { background: #5b7ae8; transform: translateY(-1px); }
.cta-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }

/* Footer */
footer {
  text-align: center; padding: 24px; color: var(--sec);
  font-size: .7em; border-top: 1px solid var(--border);
}
footer a { color: var(--acc); }

/* Scrollbar */
.modal::-webkit-scrollbar { width: 5px; }
.modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sec); font-size: .8em; grid-column: 1 / -1; }

/* Responsive */
@media (max-width: 700px) {
  .hero h1 { font-size: 1.4em; }
  .grid { grid-template-columns: 1fr; }
  .filter-bar { flex-wrap: wrap; }
  .search-box { margin-left: 0; width: 100%; }
  .search-box input { width: 100%; }
  .timeline-item { min-width: 70px; }
  .stats { gap: 14px; font-size: .7em; }
}

/* Card skeleton */
.card.hidden { display: none; }

/* ===== FEISHU FORM EMBED SECTION ===== */
.form-section {
  padding: 32px 0; border-top: 1px solid var(--border);
  text-align: center;
}
.form-section h2 {
  font-size: 1em; font-weight: 600; margin-bottom: 6px;
}
.form-section p {
  font-size: .78em; color: var(--sec);
  max-width: 500px; margin: 0 auto 20px;
}
.form-embed {
  max-width: 700px; margin: 0 auto;
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; background: var(--surface);
}
.form-embed iframe {
  width: 100%; border: none;
  min-height: 500px;
}
</style>
</head>

// ======================== TIMELINE ========================
const MILESTONES = [
  {date:"5月11日",label:"项目池公布",active:true},
  {date:"5月12日",label:"意向填报截止",active:true,urgent:true},
  {date:"5月15日",label:"最终名单锁定"},
  {date:"5月16日",label:"G1提案提交"},
  {date:"6月10日",label:"G2提交自检"},
  {date:"6月17日",label:"班级成果展"}
];

// ======================== RENDER ========================

function renderTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = MILESTONES.map(m => `
    <div class="timeline-item${m.active?' active':''}${m.urgent?' urgent':''}">
      <div class="dot"></div>
      <div class="tl-date">${m.date}</div>
      <div class="tl-label">${m.label}</div>
    </div>
  `).join('');
}

function renderStats() {
  const total = PROJECTS.length;
  const campus = PROJECTS.filter(p => p.source === '校内').length;
  const corp = total - campus;
  document.getElementById('stats-bar').innerHTML = `
    <span>📦 <strong>${total}</strong> 个项目</span>
    <span>🏫 校内 <strong>${campus}</strong></span>
    <span>🏢 企业 <strong>${corp}</strong></span>
    <span>🟢 轻量 <strong>${PROJECTS.filter(p=>p.difficulty==='轻量').length}</strong></span>
    <span>🟡 中等 <strong>${PROJECTS.filter(p=>p.difficulty==='中等').length}</strong></span>
    <span>🔴 挑战 <strong>${PROJECTS.filter(p=>p.difficulty==='挑战').length}</strong></span>
  `;
}

function renderCards(filterDiff, filterSource, query) {
  const grid = document.getElementById('project-grid');
  let items = [...PROJECTS];

  if (filterDiff !== 'all') items = items.filter(p => p.difficulty === filterDiff);
  if (filterSource !== 'all') items = items.filter(p => p.source === filterSource);
  if (query) {
    const q = query.toLowerCase();
    items = items.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.publisher.toLowerCase().includes(q) ||
      p.keywords.some(k => k.toLowerCase().includes(q))
    );
  }

  document.getElementById('grid-info').textContent = `显示 ${items.length} / ${PROJECTS.length} 个项目`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="empty-state">没有匹配的项目，试试其他筛选条件</div>`;
    return;
  }

  grid.innerHTML = items.map(p => `
    <div class="card" onclick="openModal('${p.id}')">
      <div class="card-top">
        <span class="pnum">${p.id}</span>
        <span class="diff-badge diff-${p.difficulty}">${p.difficulty}</span>
      </div>
      <h3>${p.name}</h3>
      <div class="publisher">
        <span class="source-tag">${p.source === '校内' ? '🏫' : '🏢'} ${p.source}</span>
        ${p.publisher}
      </div>
      <div class="desc">${p.desc}</div>
      <div class="tags">
        ${p.keywords.slice(0,3).map(k => `<span class="tag-item">${k}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modal-pnum').textContent = `${p.id} · ${p.source} · ${p.publisher}`;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-meta').innerHTML = `
    <span class="diff-badge diff-${p.difficulty}">${p.difficulty}</span>
    <span>${p.source === '校内' ? '🏫' : '🏢'} ${p.source}</span>
    <span>📌 ${p.publisher}</span>
  `;

  document.getElementById('modal-body').innerHTML = `
    <section>
      <h4>📝 项目简介</h4>
      <div class="field">${p.desc}</div>
    </section>
    <section>
      <h4>🎯 适合方向</h4>
      <div class="roles">
        ${p.direction.map(d => `<span class="role">${d}</span>`).join('')}
      </div>
    </section>
    <section>
      <h4>🏷️ 关键词</h4>
      <div class="roles" style="opacity:.7">
        ${p.keywords.map(k => `<span class="role" style="background:var(--surface);border:1px solid var(--border);color:var(--sec)">${k}</span>`).join('')}
      </div>
    </section>
    <hr>
    <section>
      <h4>📦 最小可交付成果</h4>
      <div class="field">${p.deliverable}</div>
    </section>
    <section>
      <h4>👥 建议协作角色</h4>
      <div class="roles">
        ${p.roles.map(r => `<span class="role">${r}</span>`).join('')}
      </div>
    </section>
    <section>
      <h4>💡 负责人关注点</h4>
      <div class="field sec">${p.note}</div>
    </section>
    <hr>
    <section style="background:var(--bg);border-radius:8px;padding:12px;font-size:.72em;color:var(--sec);line-height:1.6;">
      ⚠️ 不得上传敏感个人信息；涉及法律、医学、企业业务口径的内容必须人工复核；以原型验证为主，不承诺正式上线。<br>
      每个项目最多 3 人，负责人 1 人。每位学生必须至少负责 1 个项目。
    </section>
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ======================== COUNTDOWN ========================
function updateCountdown() {
  const deadline = new Date(2026, 4, 12, 23, 59, 59); // May 12, 2026 24:00 = May 12 23:59:59
  const now = new Date();
  const diff = deadline - now;

  const el = document.getElementById('countdown');
  if (diff <= 0) {
    el.innerHTML = `<div class="deadline" style="color:var(--red)">⏰ 报名已截止</div>`;
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  el.innerHTML = `
    <div class="countdown-item"><div class="num">${d}</div><div class="label">天</div></div>
    <div class="countdown-item"><div class="num">${String(h).padStart(2,'0')}</div><div class="label">时</div></div>
    <div class="countdown-item"><div class="num">${String(m).padStart(2,'0')}</div><div class="label">分</div></div>
    <div class="countdown-item"><div class="num">${String(s).padStart(2,'0')}</div><div class="label">秒</div></div>
    <div class="deadline">⏰ 截止：<strong>5月12日 24:00</strong></div>
  `;
}

// ======================== FILTER ========================
let currentDiff = 'all';
let currentSource = 'all';
let currentQuery = '';

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDiff = btn.dataset.filter;
    renderCards(currentDiff, currentSource, currentQuery);
  });
});

document.querySelectorAll('.filter-btn[data-source]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-source]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSource = btn.dataset.source;
    renderCards(currentDiff, currentSource, currentQuery);
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentQuery = e.target.value;
  renderCards(currentDiff, currentSource, currentQuery);
});

// ======================== INIT ========================
updateCountdown();
setInterval(updateCountdown, 1000);
renderTimeline();
renderStats();
renderCards('all', 'all', '');
</script>
</body>
</html>
