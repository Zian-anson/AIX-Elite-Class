
<!-- ====== Search Overlay ====== -->
<div id="search-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:9999;backdrop-filter:blur(4px);">
  <div style="max-width:700px;margin:80px auto 0;padding:20px;">
    <div style="background:#16161a;border:1px solid #2a2a32;border-radius:12px;overflow:hidden;">
      <!-- Search box -->
      <div style="display:flex;border-bottom:1px solid #2a2a32;">
        <input id="search-input" type="text" placeholder="搜索课程内容… (按 Esc 关闭)" 
          style="flex:1;background:transparent;border:none;padding:16px 20px;color:#e4e4ea;font-size:1em;outline:none;font-family:inherit;">
        <button onclick="closeSearch()" style="background:transparent;border:none;color:#88889a;padding:0 20px;cursor:pointer;font-size:1.2em;">✕</button>
      </div>
      <!-- AI answer area (disabled by default) -->
      <div id="ai-answer-area" style="display:none;padding:12px 20px;background:rgba(108,140,255,.05);border-bottom:1px solid #2a2a32;">
        <div style="color:#6c8cff;font-size:.78em;font-weight:600;margin-bottom:4px;">🤖 AI 回答</div>
        <div id="ai-answer" style="color:#d0d8ff;font-size:.88em;line-height:1.6;"></div>
      </div>
      <!-- Results -->
      <div id="search-results" style="max-height:60vh;overflow-y:auto;padding:0;">
        <div style="padding:20px;text-align:center;color:#555;font-size:.85em;">输入关键词搜索课程内容</div>
      </div>
      <!-- Footer -->
      <div style="padding:10px 20px;border-top:1px solid #2a2a32;display:flex;justify-content:space-between;align-items:center;font-size:.72em;color:#555;">
        <span>🔍 搜索 8 个模块 + Richard 精要</span>
        <span id="ai-status" style="cursor:pointer;" onclick="toggleAI()">
          🤖 AI 总结 <span style="color:#555;">(需配置)</span>
        </span>
      </div>
    </div>
  </div>
</div>

<script>
// Load search index
var searchIndex = [];
var searchModules = [];

fetch('search-index.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    searchIndex = data.entries || [];
    searchModules = data.modules || [];
  })
  .catch(function() { console.log('Search index not loaded'); });

// Search function
function search(query) {
  var results = [];
  var q = query.toLowerCase();
  if (!q || q.length < 1) return results;
  
  // Score each entry
  for (var i = 0; i < searchIndex.length; i++) {
    var entry = searchIndex[i];
    var text = entry.text.toLowerCase();
    var score = 0;
    
    // Exact word match
    if (text.indexOf(q) >= 0) {
      score += text.split(q).length - 1;
      // Boost for exact phrase match
      if (text.indexOf(q + '。') >= 0 || text.indexOf(q + '，') >= 0) score += 2;
    }
    
    // Partial match for Chinese characters
    for (var j = 0; j < q.length - 1; j++) {
      var bigram = q.substring(j, j + 2);
      if (text.indexOf(bigram) >= 0) score += 0.5;
    }
    
    if (score > 0) {
      results.push({
        entry: entry,
        score: score
      });
    }
  }
  
  // Sort by score
  results.sort(function(a, b) { return b.score - a.score; });
  
  // Return top results with highlight
  var out = [];
  for (var i = 0; i < Math.min(results.length, 20); i++) {
    var r = results[i];
    var text = r.entry.text;
    var idx = text.toLowerCase().indexOf(q);
    if (idx >= 0) {
      var start = Math.max(0, idx - 30);
      var end = Math.min(text.length, idx + q.length + 60);
      var snippet = (start > 0 ? '…' : '') + text.substring(start, end) + (end < text.length ? '…' : '');
      r.snippet = snippet;
    } else {
      r.snippet = text.substring(0, 120);
    }
    out.push(r);
  }
  return out;
}

// Display results
function showResults(query) {
  var area = document.getElementById('search-results');
  if (!query || query.length < 1) {
    area.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.85em;">输入关键词搜索课程内容</div>';
    return;
  }
  
  var results = search(query);
  if (results.length === 0) {
    area.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.85em;">没有找到相关结果，试试其他关键词</div>';
    return;
  }
  
  var html = '<div style="padding:4px 16px;color:#555;font-size:.72em;">找到 ' + results.length + ' 条结果</div>';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var modColor = '#6c8cff';
    html += '<div style="padding:10px 20px;border-bottom:1px solid #2a2a32;cursor:pointer;" onclick="goToModule('' + r.entry.module + '')">'
      + '<div style="font-size:.7em;color:' + modColor + ';margin-bottom:2px;">' + r.entry.module + ' · ' + r.entry.module_name.substring(0, 30) + '</div>'
      + '<div style="font-size:.85em;color:#c8c8d0;line-height:1.5;">' + r.snippet + '</div>'
      + '</div>';
  }
  area.innerHTML = html;
  
  // Also check if AI is enabled
  checkAI(query, results);
}

// Go to module
function goToModule(moduleTag) {
  closeSearch();
  var idx = parseInt(moduleTag.replace('模块', '')) - 1;
  if (idx >= 0 && idx <= 7) {
    var links = document.querySelectorAll('.sidebar-link');
    if (links[idx]) links[idx].click();
  }
}

// AI toggle
var aiEnabled = false;
var aiApiKey = '';

function toggleAI() {
  if (!aiApiKey) {
    var key = prompt('输入 API Key 启用 AI 总结功能
(DeepSeek / OpenAI 兼容格式)');
    if (key && key.length > 10) {
      aiApiKey = key;
      aiEnabled = true;
      document.getElementById('ai-status').innerHTML = '🤖 AI 总结 <span style="color:#4ade80;">已启用</span>';
      try { localStorage.setItem('aix-ai-key', key); } catch(e) {}
    }
  } else {
    aiEnabled = !aiEnabled;
    document.getElementById('ai-status').innerHTML = aiEnabled 
      ? '🤖 AI 总结 <span style="color:#4ade80;">已启用</span>'
      : '🤖 AI 总结 <span style="color:#555;">已关闭</span>';
  }
}

// Check for saved API key
try {
  var saved = localStorage.getItem('aix-ai-key');
  if (saved && saved.length > 10) {
    aiApiKey = saved;
    aiEnabled = true;
    document.getElementById('ai-status').innerHTML = '🤖 AI 总结 <span style="color:#4ade80;">已启用</span>';
  }
} catch(e) {}

// AI answer
function checkAI(query, results) {
  var area = document.getElementById('ai-answer-area');
  var answerDiv = document.getElementById('ai-answer');
  
  if (!aiEnabled || !aiApiKey || results.length === 0) {
    area.style.display = 'none';
    return;
  }
  
  area.style.display = 'block';
  answerDiv.innerHTML = '正在分析…';
  
  // Build context from top results
  var context = results.slice(0, 5).map(function(r) { 
    return '[' + r.entry.module + '] ' + r.entry.text; 
  }).join('\n\n');
  
  fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + aiApiKey
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        {role: 'system', content: '你是一个AI+X Elite Class课程助教。根据提供的课程内容回答学生问题。只基于已有内容回答，不要编造。用中文回答，简洁明了。'},
        {role: 'user', content: '课程资料：\n' + context + '\n\n问题：' + query}
      ],
      temperature: 0.3,
      max_tokens: 500
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var answer = data.choices && data.choices[0] ? data.choices[0].message.content : '无法获取回答';
    answerDiv.innerHTML = answer.replace(/\n/g, '<br>');
  })
  .catch(function() {
    answerDiv.innerHTML = 'AI 服务暂时不可用，请检查 API Key 或网络连接。下方搜索结果仍然可用。';
  });
}

// Open/close search
function openSearch() {
  document.getElementById('search-overlay').style.display = 'block';
  setTimeout(function() {
    document.getElementById('search-input').focus();
  }, 100);
}

function closeSearch() {
  document.getElementById('search-overlay').style.display = 'none';
  document.getElementById('search-results').innerHTML = 
    '<div style="padding:20px;text-align:center;color:#555;font-size:.85em;">输入关键词搜索课程内容</div>';
  document.getElementById('ai-answer-area').style.display = 'none';
}

// Event listeners
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeSearch();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

// Search input handler
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('search-input');
  if (input) {
    var timer;
    input.addEventListener('input', function() {
      clearTimeout(timer);
      timer = setTimeout(function() { showResults(input.value); }, 200);
    });
  }
});
</script>
