
<!-- ===== Floating Chat Bot ===== -->
<style>
.chat-fab { position:fixed; bottom:24px; right:24px; z-index:9999; }
.chat-fab-btn {
  width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,#6c8cff,#a78bfa);
  border:none; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(108,140,255,.4);
  transition:.2s; display:flex; align-items:center; justify-content:center;
}
.chat-fab-btn:hover { transform:scale(1.08); box-shadow:0 6px 24px rgba(108,140,255,.5); }
.chat-fab-btn .pulse { position:absolute; width:52px; height:52px; border-radius:50%; animation:pulse 2s infinite; background:rgba(108,140,255,.3); }
@keyframes pulse { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.5);opacity:0} }

.chat-window {
  position:fixed; bottom:88px; right:24px; width:380px; max-height:560px;
  background:#16161a; border:1px solid #2a2a32; border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:9998; display:none; overflow:hidden;
  flex-direction:column;
}
.chat-window.open { display:flex; }
.chat-header {
  padding:14px 16px; background:#1a1a24; border-bottom:1px solid #2a2a32;
  display:flex; justify-content:space-between; align-items:center;
}
.chat-header h3 { font-size:.85em; font-weight:600; color:#d0d0e0; letter-spacing:-.01em; }
.chat-header .close-btn { background:none; border:none; color:#888; cursor:pointer; font-size:1.1em; padding:2px 6px; border-radius:4px; }
.chat-header .close-btn:hover { background:#2a2a32; }
.chat-body { flex:1; overflow-y:auto; padding:12px 14px; min-height:200px; max-height:400px; }
.chat-body::-webkit-scrollbar { width:4px; }
.chat-body::-webkit-scrollbar-thumb { background:#2a2a32; border-radius:2px; }
.chat-input-area { padding:10px 12px; border-top:1px solid #2a2a32; display:flex; gap:8px; }
.chat-input-area input {
  flex:1; background:#1a1a24; border:1px solid #2a2a32; border-radius:8px;
  padding:10px 14px; color:#e4e4ea; font-size:.85em; outline:none; font-family:inherit;
}
.chat-input-area input:focus { border-color:#6c8cff; }
.chat-input-area button {
  background:linear-gradient(135deg,#6c8cff,#a78bfa); border:none; border-radius:8px;
  color:#fff; padding:8px 14px; cursor:pointer; font-size:.8em; font-weight:500;
}
.chat-input-area button:hover { opacity:.9; }

.chat-msg { margin-bottom:10px; max-width:90%; }
.chat-msg.user { margin-left:auto; }
.chat-msg.bot { margin-right:auto; }
.chat-msg .bubble {
  padding:8px 12px; border-radius:10px; font-size:.82em; line-height:1.5;
}
.chat-msg.user .bubble { background:#6c8cff; color:#fff; border-bottom-right-radius:3px; }
.chat-msg.bot .bubble { background:#1e1e28; color:#c8c8d0; border-bottom-left-radius:3px; }
.chat-msg.bot .src { font-size:.65em; color:#555; margin-top:2px; padding-left:4px; }
.chat-msg .typing { display:flex; gap:4px; padding:4px 0; }
.chat-msg .typing span { width:6px; height:6px; border-radius:50%; background:#555; animation:typing 1.4s infinite; }
.chat-msg .typing span:nth-child(2) { animation-delay:.2s; }
.chat-msg .typing span:nth-child(3) { animation-delay:.4s; }
@keyframes typing { 0%,60%,100%{opacity:.3} 30%{opacity:1} }

.chat-footer { padding:6px 14px; border-top:1px solid #2a2a32; display:flex; justify-content:space-between; font-size:.65em; color:#555; }
.chat-footer .ai-toggle { cursor:pointer; color:#555; }
.chat-footer .ai-toggle.on { color:#4ade80; }
.chat-footer .ai-toggle.off { color:#555; }

@media (max-width:600px) {
  .chat-window { width:calc(100vw - 32px); right:16px; bottom:80px; max-height:70vh; }
}
</style>

<div class="chat-fab">
  <button class="chat-fab-btn" onclick="toggleChat()" id="chatFabBtn">
    <div class="pulse"></div>
    <span>💬</span>
  </button>
</div>

<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <h3>💬 课程小助手</h3>
    <button class="close-btn" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="chat-msg bot">
      <div class="bubble">👋 你好！我是 AI+X Elite Class 课程小助手。<br><br>
      你可以问我任何课程相关的问题，比如：<br>
      • "KSTAR 的 S 是什么？"<br>
      • "C4A 怎么评分？"<br>
      • "Richard 说过什么关于核心竞争力的话？"</div>
    </div>
  </div>
  <div class="chat-input-area">
    <input id="chatInput" placeholder="问个课程问题…" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">发送</button>
  </div>
  <div class="chat-footer">
    <span id="chatResultCount"></span>
    <span class="ai-toggle off" id="chatAiToggle" onclick="toggleChatAI()">🤖 AI 总结 关</span>
  </div>
</div>

<script>
// State
var chatIndex = [];
var chatAIKey = '';
var chatAIOn = false;

// Load search index
fetch('search-index.json').then(function(r){return r.json()}).then(function(d){
  chatIndex = d.entries || [];
}).catch(function(){});

// Try load saved API key
try {
  var saved = localStorage.getItem('aix-ai-key');
  if (saved && saved.length > 10) {
    chatAIKey = saved;
    chatAIOn = true;
    document.getElementById('chatAiToggle').textContent = '🤖 AI 总结 开';
    document.getElementById('chatAiToggle').className = 'ai-toggle on';
  }
} catch(e){}

function toggleChat() {
  var w = document.getElementById('chatWindow');
  w.classList.toggle('open');
  if (w.classList.contains('open')) {
    setTimeout(function(){document.getElementById('chatInput').focus();}, 200);
  }
}

function toggleChatAI() {
  if (!chatAIKey) {
    var key = prompt('输入 API Key 启用 AI 总结功能\n(DeepSeek / OpenAI 兼容格式)');
    if (key && key.length > 10) {
      chatAIKey = key;
      chatAIOn = true;
      localStorage.setItem('aix-ai-key', key);
      document.getElementById('chatAiToggle').textContent = '🤖 AI 总结 开';
      document.getElementById('chatAiToggle').className = 'ai-toggle on';
    }
  } else {
    chatAIOn = !chatAIOn;
    var tog = document.getElementById('chatAiToggle');
    tog.textContent = chatAIOn ? '🤖 AI 总结 开' : '🤖 AI 总结 关';
    tog.className = chatAIOn ? 'ai-toggle on' : 'ai-toggle off';
  }
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';
  
  // Add user message
  addMsg('user', q);
  
  // Show typing
  var typingId = 'typing-' + Date.now();
  var typingHtml = '<div class="chat-msg bot" id="' + typingId + '"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  document.getElementById('chatBody').insertAdjacentHTML('beforeend', typingHtml);
  scrollChat();
  
  // Search
  var results = searchCourse(q);
  document.getElementById('chatResultCount').textContent = '找到 ' + results.length + ' 条结果';
  
  if (results.length === 0) {
    document.getElementById(typingId).outerHTML = '<div class="chat-msg bot"><div class="bubble">😕 没找到相关结果。试试换个问法，或者问得更具体一些。</div></div>';
    scrollChat();
    return;
  }
  
  if (chatAIOn && chatAIKey) {
    // AI mode: search + summarize
    callAI(q, results, typingId);
  } else {
    // Search-only mode: show results directly
    var html = '<div class="chat-msg bot"><div class="bubble">';
    results.slice(0, 5).forEach(function(r) {
      var mod = r.entry.module || '';
      var txt = r.snippet || r.entry.text.substring(0, 120);
      html += '<div style="margin-bottom:6px;padding:6px 8px;background:rgba(108,140,255,.06);border-radius:6px;border-left:2px solid #6c8cff;">';
      html += '<div style="font-size:.72em;color:#6c8cff;margin-bottom:2px;">' + mod + '</div>';
      html += '<div>' + txt + '</div></div>';
    });
    if (results.length > 5) html += '<div style="font-size:.72em;color:#555;margin-top:4px;">…还有 ' + (results.length - 5) + ' 条结果</div>';
    html += '</div><div class="src">💡 配置 API Key 可启用 AI 总结</div></div>';
    document.getElementById(typingId).outerHTML = html;
    scrollChat();
  }
}

function searchCourse(q) {
  var query = q.toLowerCase();
  if (!query || query.length < 1) return [];
  var scored = [];
  for (var i = 0; i < chatIndex.length; i++) {
    var entry = chatIndex[i];
    var text = (entry.text || '').toLowerCase();
    var score = 0;
    if (text.indexOf(query) >= 0) {
      score += (text.split(query).length - 1) * 3;
    }
    // bigram for fuzzy chinese match
    for (var j = 0; j < query.length - 1 && j < 6; j++) {
      var bg = query.substring(j, j + 2);
      if (text.indexOf(bg) >= 0) score += 0.5;
    }
    if (score > 0) scored.push({entry: entry, score: score});
  }
  scored.sort(function(a,b){return b.score - a.score});
  
  // Build snippets
  var out = [];
  for (var i = 0; i < Math.min(scored.length, 10); i++) {
    var r = scored[i];
    var text = r.entry.text;
    var idx = text.toLowerCase().indexOf(query);
    if (idx >= 0) {
      var start = Math.max(0, idx - 20);
      var end = Math.min(text.length, idx + query.length + 40);
      r.snippet = (start > 0 ? '…' : '') + text.substring(start, end) + (end < text.length ? '…' : '');
    } else {
      r.snippet = text.substring(0, 100);
    }
    out.push(r);
  }
  return out;
}

function callAI(query, results, typingId) {
  var context = results.slice(0, 5).map(function(r){
    return '[' + (r.entry.module || '') + '] ' + (r.entry.text || '');
  }).join('\n\n');
  
  var body = JSON.stringify({
    model: 'deepseek-chat',
    messages: [
      {role:'system',content:'你是 AI+X Elite Class 课程助教。基于提供的课程内容回答。只基于已有内容，不编造。用中文，简洁。'},
      {role:'user',content:'课程资料：\n' + context + '\n\n问题：' + query}
    ],
    temperature: 0.3,
    max_tokens: 500
  });
  
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.deepseek.com/chat/completions');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + chatAIKey);
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      var answer = data.choices && data.choices[0] ? data.choices[0].message.content : '无法获取回答';
      var el = document.getElementById(typingId);
      if (el) el.outerHTML = '<div class="chat-msg bot"><div class="bubble">' + answer.replace(/\n/g,'<br>') + '</div></div>';
    } catch(e) {
      var el = document.getElementById(typingId);
      if (el) el.outerHTML = '<div class="chat-msg bot"><div class="bubble">AI 服务出错，请检查 API Key</div></div>';
    }
    scrollChat();
  };
  xhr.onerror = function() {
    var el = document.getElementById(typingId);
    if (el) el.outerHTML = '<div class="chat-msg bot"><div class="bubble">网络错误，请检查连接</div></div>';
    scrollChat();
  };
  xhr.send(body);
}

function addMsg(role, text) {
  var cls = role === 'user' ? 'user' : 'bot';
  var html = '<div class="chat-msg ' + cls + '"><div class="bubble">' + text.replace(/\n/g,'<br>') + '</div></div>';
  document.getElementById('chatBody').insertAdjacentHTML('beforeend', html);
  scrollChat();
}

function scrollChat() {
  var body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}
</script>
